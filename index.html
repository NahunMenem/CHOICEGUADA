<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Emergencias Pediátricas</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .container {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 36px;
    max-width: 780px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  .header {
    text-align: center;
    margin-bottom: 28px;
  }

  .header-logo {
    display: block;
    margin: 0 auto 14px;
    max-height: 60px;
    width: auto;
    object-fit: contain;
  }

  .header h1 {
    color: #e2e8f0;
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }

  .header p {
    color: #94a3b8;
    font-size: 0.85rem;
  }

  .progress-bar-wrap {
    background: rgba(255,255,255,0.1);
    border-radius: 50px;
    height: 8px;
    margin-bottom: 6px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #6366f1, #a78bfa);
    border-radius: 50px;
    transition: width 0.4s ease;
  }

  .progress-text {
    display: flex;
    justify-content: space-between;
    color: #94a3b8;
    font-size: 0.78rem;
    margin-bottom: 22px;
  }

  .topic-badge {
    display: inline-block;
    background: rgba(99,102,241,0.25);
    color: #a5b4fc;
    border: 1px solid rgba(99,102,241,0.4);
    border-radius: 50px;
    padding: 4px 14px;
    font-size: 0.75rem;
    font-weight: 600;
    margin-bottom: 14px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .question-text {
    color: #e2e8f0;
    font-size: 1.1rem;
    font-weight: 500;
    line-height: 1.6;
    margin-bottom: 24px;
    min-height: 56px;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 28px;
  }

  .option-btn {
    background: rgba(255,255,255,0.06);
    border: 2px solid rgba(255,255,255,0.12);
    border-radius: 12px;
    padding: 14px 18px;
    text-align: left;
    color: #cbd5e1;
    font-size: 0.97rem;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .option-btn:hover:not(:disabled) {
    background: rgba(99,102,241,0.18);
    border-color: rgba(99,102,241,0.5);
    color: #e2e8f0;
    transform: translateX(4px);
  }

  .option-label {
    background: rgba(255,255,255,0.1);
    border-radius: 8px;
    width: 30px;
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 0.85rem;
    flex-shrink: 0;
    transition: all 0.2s;
  }

  .option-btn.correct {
    background: rgba(34,197,94,0.2);
    border-color: #22c55e;
    color: #86efac;
  }

  .option-btn.correct .option-label {
    background: #22c55e;
    color: #fff;
  }

  .option-btn.wrong {
    background: rgba(239,68,68,0.2);
    border-color: #ef4444;
    color: #fca5a5;
  }

  .option-btn.wrong .option-label {
    background: #ef4444;
    color: #fff;
  }

  .option-btn:disabled {
    cursor: default;
  }

  .feedback-box {
    border-radius: 12px;
    padding: 14px 18px;
    margin-bottom: 22px;
    font-size: 0.93rem;
    font-weight: 500;
    display: none;
    align-items: flex-start;
    gap: 10px;
  }

  .feedback-box.show { display: flex; }

  .feedback-box.correct {
    background: rgba(34,197,94,0.15);
    border: 1px solid rgba(34,197,94,0.35);
    color: #86efac;
  }

  .feedback-box.wrong {
    background: rgba(239,68,68,0.15);
    border: 1px solid rgba(239,68,68,0.35);
    color: #fca5a5;
  }

  .feedback-icon { font-size: 1.2rem; flex-shrink: 0; }

  .feedback-text { line-height: 1.5; }

  .nav-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }

  .btn {
    border: none;
    border-radius: 10px;
    padding: 12px 24px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-secondary {
    background: rgba(255,255,255,0.08);
    color: #94a3b8;
    border: 1px solid rgba(255,255,255,0.12);
  }

  .btn-secondary:hover:not(:disabled) {
    background: rgba(255,255,255,0.14);
    color: #cbd5e1;
  }

  .btn-secondary:disabled { opacity: 0.35; cursor: default; }

  .btn-primary {
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: #fff;
    box-shadow: 0 4px 14px rgba(99,102,241,0.35);
  }

  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 18px rgba(99,102,241,0.5);
  }

  .score-chip {
    background: rgba(99,102,241,0.2);
    border: 1px solid rgba(99,102,241,0.35);
    border-radius: 50px;
    color: #a5b4fc;
    font-size: 0.85rem;
    font-weight: 600;
    padding: 6px 16px;
  }

  .btn-reset {
    background: rgba(239,68,68,0.12);
    color: #f87171;
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 10px;
    padding: 7px 14px;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .btn-reset:hover {
    background: rgba(239,68,68,0.22);
    border-color: rgba(239,68,68,0.5);
  }

  .restore-banner {
    background: rgba(99,102,241,0.12);
    border: 1px solid rgba(99,102,241,0.3);
    border-radius: 10px;
    color: #a5b4fc;
    font-size: 0.83rem;
    padding: 10px 14px;
    margin-bottom: 16px;
    display: none;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }

  .restore-banner.show { display: flex; }

  /* Results screen */
  .results {
    text-align: center;
    display: none;
  }

  .results.show { display: block; }

  .results-score {
    font-size: 5rem;
    font-weight: 800;
    background: linear-gradient(135deg, #6366f1, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin: 16px 0 8px;
  }

  .results-label {
    color: #94a3b8;
    font-size: 1rem;
    margin-bottom: 24px;
  }

  .results-detail {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }

  .results-stat {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    padding: 16px 24px;
    min-width: 130px;
  }

  .results-stat-num {
    font-size: 2rem;
    font-weight: 700;
    color: #e2e8f0;
  }

  .results-stat-num.green { color: #4ade80; }
  .results-stat-num.red { color: #f87171; }

  .results-stat-label {
    color: #64748b;
    font-size: 0.8rem;
    margin-top: 4px;
  }

  .results h2 {
    color: #e2e8f0;
    font-size: 1.6rem;
    margin-bottom: 8px;
  }

  .quiz-area { display: block; }
  .quiz-area.hide { display: none; }
</style>
</head>
<body>
<div class="container">

  <!-- Quiz Area -->
  <div class="quiz-area" id="quizArea">
    <div class="header">
      <img src="DOCYAPRO_BLANCO_eerxi3.png" alt="Logo" class="header-logo">
      <h1>Emergencias Pediátricas</h1>
      <p>Seleccioná la respuesta correcta</p>
      <p style="margin-top:8px; color:#f9a8d4; font-size:0.82rem; letter-spacing:0.3px;">con amor, Nahun ❤️</p>
    </div>

    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="progress-text">
      <span id="progressLabel">Pregunta 1 de 100</span>
      <span id="scoreLabel">Puntaje: 0</span>
    </div>

    <div class="restore-banner" id="restoreBanner">
      <span>📂 Progreso guardado restaurado</span>
      <button class="btn-reset" onclick="confirmRestart()">🗑 Reiniciar todo</button>
    </div>

    <div class="topic-badge" id="topicBadge">Tema</div>
    <div class="question-text" id="questionText"></div>

    <div class="options" id="optionsContainer"></div>

    <div class="feedback-box" id="feedbackBox">
      <span class="feedback-icon" id="feedbackIcon"></span>
      <span class="feedback-text" id="feedbackText"></span>
    </div>

    <div class="nav-row">
      <button class="btn btn-secondary" id="prevBtn" onclick="prevQuestion()">← Anterior</button>
      <span class="score-chip" id="scoreChip">0 / 0</span>
      <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()">Siguiente →</button>
    </div>

    <div style="text-align:center; margin-top:16px;">
      <button class="btn-reset" onclick="confirmRestart()" style="margin:0 auto;">🗑 Reiniciar todo</button>
    </div>
  </div>

  <!-- Results Screen -->
  <div class="results" id="resultsScreen">
    <h2>Resultado Final</h2>
    <div class="results-score" id="resultsPct"></div>
    <div class="results-label" id="resultsMsg"></div>
    <div class="results-detail">
      <div class="results-stat">
        <div class="results-stat-num green" id="rCorrect"></div>
        <div class="results-stat-label">Correctas</div>
      </div>
      <div class="results-stat">
        <div class="results-stat-num red" id="rWrong"></div>
        <div class="results-stat-label">Incorrectas</div>
      </div>
      <div class="results-stat">
        <div class="results-stat-num" id="rTotal" style="color:#a5b4fc"></div>
        <div class="results-stat-label">Total</div>
      </div>
    </div>
    <button class="btn btn-primary" onclick="restartQuiz()" style="margin:0 auto;display:block;padding:14px 40px;">Reiniciar Quiz</button>
  </div>

</div>

<script>
const questions = [
  // ── TEC ──────────────────────────────────────────────────────────────
  {
    topic: "TEC",
    q: "¿Cuál es la clasificación de TEC leve según la Escala de Glasgow (GCS)?",
    options: ["3 – 8", "9 – 12", "13 – 15", "6 – 9"],
    correct: 2
  },
  {
    topic: "TEC",
    q: "La tríada de Cushing en hipertensión endocraneana incluye:",
    options: [
      "Hipotensión, taquicardia, bradipnea",
      "Hipertensión, bradicardia, bradipnea/irregularidad respiratoria",
      "Hipotensión, bradicardia, taquipnea",
      "Hipertensión, taquicardia, apnea"
    ],
    correct: 1
  },
  {
    topic: "TEC",
    q: "La primera causa de muerte en niños mayores de 1 año en países desarrollados es:",
    options: ["Sepsis", "Cáncer", "Traumatismo", "Cardiopatías congénitas"],
    correct: 2
  },
  {
    topic: "TEC",
    q: "En TEC grave, el objetivo de PaCO₂ recomendado (normocapnia) es:",
    options: ["25 – 30 mmHg", "35 – 40 mmHg", "45 – 50 mmHg", "55 – 60 mmHg"],
    correct: 1
  },
  {
    topic: "TEC",
    q: "El tipo de hematoma intracraneal más frecuente en niños menores de 2 años con TEC no accidental es:",
    options: ["Epidural", "Subdural", "Subaracnoideo", "Intraparenquimatoso"],
    correct: 1
  },
  {
    topic: "TEC",
    q: "El 'intervalo lúcido' clásicamente se asocia al hematoma:",
    options: ["Subdural agudo", "Epidural (arteria meníngea media)", "Subaracnoideo", "Intraparenquimatoso"],
    correct: 1
  },
  {
    topic: "TEC",
    q: "En TEC moderado-grave, la maniobra para estabilizar la columna cervical durante la apertura de la vía aérea es:",
    options: [
      "Hiperextensión del cuello",
      "Tracción manual en línea de la columna cervical",
      "Rotación lateral de la cabeza",
      "Flexión del cuello"
    ],
    correct: 1
  },
  // ── CONVULSIONES Y STATUS ─────────────────────────────────────────────
  {
    topic: "Convulsiones",
    q: "El status epilepticus se define clásicamente como convulsión continua o sin recuperación de conciencia durante más de:",
    options: ["5 minutos", "15 minutos", "30 minutos", "60 minutos"],
    correct: 2
  },
  {
    topic: "Convulsiones",
    q: "La primera línea de tratamiento del status epilepticus en urgencias (sin acceso venoso) es:",
    options: [
      "Fenitoína IV",
      "Diazepam rectal o midazolam intranasal/bucal",
      "Fenobarbital IM",
      "Levetiracetam IV"
    ],
    correct: 1
  },
  {
    topic: "Convulsiones",
    q: "Dosis habitual de diazepam rectal en status epilepticus:",
    options: ["0.1 mg/kg", "0.3 mg/kg", "0.5 mg/kg", "1 mg/kg"],
    correct: 2
  },
  {
    topic: "Convulsiones",
    q: "La causa más frecuente de status epilepticus en niños menores de 5 años es:",
    options: ["Meningitis bacteriana", "Crisis febril", "Epilepsia conocida", "Traumatismo craneal"],
    correct: 1
  },
  {
    topic: "Convulsiones",
    q: "En status epilepticus refractario (que no cede con 2 dosis de benzodiacepinas), la siguiente droga de elección es:",
    options: [
      "Tercera dosis de diazepam",
      "Fenitoína o fosfenitoína IV",
      "Paracetamol IV",
      "Adrenalina"
    ],
    correct: 1
  },
  {
    topic: "Convulsiones",
    q: "La crisis febril simple se diferencia de la convulsión febril compleja principalmente porque:",
    options: [
      "Dura más de 15 minutos",
      "Es generalizada, dura <15 min y no se repite en 24 h",
      "Es focal",
      "Tiene déficit postictal prolongado"
    ],
    correct: 1
  },
  // ── QUEMADURAS ────────────────────────────────────────────────────────
  {
    topic: "Quemaduras",
    q: "Una quemadura de segundo grado superficial (dérmico superficial) se caracteriza por:",
    options: [
      "Solo eritema sin ampollas ni dolor",
      "Ampollas, base rosada húmeda y dolor intenso",
      "Necrosis completa sin dolor",
      "Carbonización y anestesia"
    ],
    correct: 1
  },
  {
    topic: "Quemaduras",
    q: "La fórmula de Parkland para reposición de líquidos en las primeras 24 h es:",
    options: [
      "2 ml × kg × % SCQ",
      "3 ml × kg × % SCQ",
      "4 ml × kg × % SCQ",
      "6 ml × kg × % SCQ"
    ],
    correct: 2
  },
  {
    topic: "Quemaduras",
    q: "En pediatría, la regla de los 9 se modifica principalmente porque:",
    options: [
      "El tronco es más pequeño",
      "La cabeza tiene mayor superficie corporal relativa que en adultos",
      "Las extremidades inferiores son más grandes",
      "El peso cambia la superficie total"
    ],
    correct: 1
  },
  {
    topic: "Quemaduras",
    q: "¿Qué porcentaje de superficie corporal quemada en un niño es criterio de hospitalización?",
    options: [">5%", ">10%", ">20%", ">30%"],
    correct: 1
  },
  {
    topic: "Quemaduras",
    q: "En quemaduras eléctricas de alto voltaje, la complicación sistémica más temida es:",
    options: [
      "Hipotermia severa",
      "Rabdomiólisis con insuficiencia renal aguda",
      "Infección por Pseudomonas",
      "Cicatriz hipertrófica"
    ],
    correct: 1
  },
  {
    topic: "Quemaduras",
    q: "El fluido de elección para la reposición inicial en quemaduras graves es:",
    options: ["Dextrosa 5%", "Solución fisiológica 0.9%", "Ringer lactato", "Albúmina al 20%"],
    correct: 2
  },
  {
    topic: "Quemaduras",
    q: "La quemadura de tercer grado se caracteriza por:",
    options: [
      "Eritema sin ampollas",
      "Ampollas dolorosas",
      "Destrucción total del espesor dérmico, aspecto coriáceo, insensible al dolor",
      "Solo compromiso de la epidermis"
    ],
    correct: 2
  },
  // ── SEPSIS Y SHOCK SÉPTICO ─────────────────────────────────────────────
  {
    topic: "Sepsis",
    q: "Según Sepsis-3, la sepsis se define como:",
    options: [
      "Fiebre + leucocitosis + foco infeccioso",
      "Infección con disfunción orgánica que amenaza la vida",
      "SRIS sin foco identificable",
      "Hipotensión + taquicardia de causa infecciosa"
    ],
    correct: 1
  },
  {
    topic: "Sepsis",
    q: "El shock séptico pediátrico se caracteriza por:",
    options: [
      "Solo fiebre alta",
      "Sepsis con disfunción cardiovascular persistente a pesar de resucitación adecuada",
      "Taquicardia aislada",
      "Hipotermia sin foco"
    ],
    correct: 1
  },
  {
    topic: "Sepsis",
    q: "El primer bolo de volumen recomendado en shock séptico pediátrico es:",
    options: ["5 ml/kg", "10 ml/kg", "20 ml/kg en 10-20 min", "40 ml/kg"],
    correct: 2
  },
  {
    topic: "Sepsis",
    q: "El lactato sérico se considera elevado (hiperlactatemia) cuando supera:",
    options: ["1 mmol/L", "2 mmol/L", "4 mmol/L", "6 mmol/L"],
    correct: 1
  },
  {
    topic: "Sepsis",
    q: "El vasopresor de primera elección en shock séptico pediátrico con presentación de 'shock frío' (extremidades frías, llenado capilar lento) es:",
    options: ["Noradrenalina", "Adrenalina", "Vasopresina", "Dobutamina"],
    correct: 1
  },
  {
    topic: "Sepsis",
    q: "El antibiótico empírico de primera línea en sepsis sin foco en pediatría (fuera de periodo neonatal) generalmente incluye:",
    options: [
      "Amoxicilina oral",
      "Cefalosporina de 3.ª generación (ceftriaxona/cefotaxima) IV",
      "Metronidazol IV",
      "Vancomicina sola"
    ],
    correct: 1
  },
  {
    topic: "Sepsis",
    q: "La 'hora de oro' en sepsis hace referencia a:",
    options: [
      "Realizar una TC en la primera hora",
      "Iniciar antibióticos + resucitación con fluidos en la primera hora",
      "Trasladar al paciente en la primera hora",
      "Tomar laboratorio en la primera hora"
    ],
    correct: 1
  },
  // ── SÍNCOPE ───────────────────────────────────────────────────────────
  {
    topic: "Síncope",
    q: "La causa más frecuente de síncope en niños y adolescentes es:",
    options: [
      "Cardíaco (arritmia)",
      "Neurológico (epilepsia)",
      "Vasovagal / neurocardiogénico",
      "Metabólico (hipoglucemia)"
    ],
    correct: 2
  },
  {
    topic: "Síncope",
    q: "El síncope vasovagal se precipita típicamente por:",
    options: [
      "Ejercicio intenso",
      "Dolor, calor, bipedestación prolongada o visión de sangre",
      "Inmersión en agua fría",
      "Ingesta de alimentos"
    ],
    correct: 1
  },
  {
    topic: "Síncope",
    q: "El síncope durante el ejercicio en un niño debe hacer sospechar principalmente:",
    options: [
      "Síncope vasovagal",
      "Hipoglucemia",
      "Origen cardíaco (miocardiopatía, arritmia)",
      "Crisis de ansiedad"
    ],
    correct: 2
  },
  {
    topic: "Síncope",
    q: "¿Qué hallazgo en el ECG es más sugestivo de síncope de origen cardíaco?",
    options: [
      "Eje normal",
      "QTc prolongado >480 ms",
      "Bradicardia sinusal leve",
      "Repolarización precoz aislada"
    ],
    correct: 1
  },
  {
    topic: "Síncope",
    q: "El tilt test (prueba de mesa basculante) se utiliza para diagnosticar:",
    options: [
      "Síncope arrítmico",
      "Epilepsia",
      "Síncope vasovagal / disautonomía",
      "Hipoglucemia reactiva"
    ],
    correct: 2
  },
  // ── DOLOR TORÁCICO ────────────────────────────────────────────────────
  {
    topic: "Dolor Torácico",
    q: "La causa más frecuente de dolor torácico en pediatría es:",
    options: ["Cardíaca", "Musculoesquelética / costocondral", "Pulmonar", "Gastrointestinal"],
    correct: 1
  },
  {
    topic: "Dolor Torácico",
    q: "El dolor torácico de origen cardíaco en niños se asocia principalmente a:",
    options: [
      "Tos",
      "Esfuerzo físico",
      "Ingesta de alimentos",
      "Presión directa sobre el esternón"
    ],
    correct: 1
  },
  {
    topic: "Dolor Torácico",
    q: "En pericarditis aguda, el ECG clásicamente muestra:",
    options: [
      "Elevación localizada del ST con imagen especular",
      "Elevación difusa del ST cóncavo ('en silla de montar') + depresión PR",
      "Depresión difusa del ST",
      "Bloqueo aurículo-ventricular completo"
    ],
    correct: 1
  },
  {
    topic: "Dolor Torácico",
    q: "El tratamiento de primera línea de la pericarditis aguda idiopática es:",
    options: [
      "Antibióticos",
      "Corticoides a dosis altas",
      "AINE + colchicina",
      "Anticoagulación sistémica"
    ],
    correct: 2
  },

// ── LocalStorage ───────────────────────────────────────────────────────────
const LS_KEY = 'quiz_guada_state';

function saveState() {
  localStorage.setItem(LS_KEY, JSON.stringify({ current, answered }));
}

function loadState() {
  try {
    const saved = JSON.parse(localStorage.getItem(LS_KEY));
    if (saved && Array.isArray(saved.answered) && saved.answered.length === questions.length) {
      current = saved.current ?? 0;
      answered = saved.answered;
      return true;
    }
  } catch(e) {}
  return false;
}

// ── State ──────────────────────────────────────────────────────────────────
let current = 0;
let answered = new Array(questions.length).fill(null);

function render() {
  const q = questions[current];
  const total = questions.length;

  document.getElementById('progressBar').style.width = ((current + 1) / total * 100) + '%';
  document.getElementById('progressLabel').textContent = `Pregunta ${current + 1} de ${total}`;

  const correct = answered.filter((a, i) => a === questions[i].correct).length;
  const attempted = answered.filter(a => a !== null).length;
  document.getElementById('scoreLabel').textContent = `Correctas: ${correct}`;
  document.getElementById('scoreChip').textContent = `${correct} / ${attempted}`;

  document.getElementById('topicBadge').textContent = q.topic;
  document.getElementById('questionText').textContent = `${current + 1}. ${q.q}`;

  const labels = ['A', 'B', 'C', 'D'];
  const cont = document.getElementById('optionsContainer');
  cont.innerHTML = '';

  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.disabled = answered[current] !== null;

    let extraClass = '';
    if (answered[current] !== null) {
      if (i === q.correct) extraClass = 'correct';
      else if (i === answered[current]) extraClass = 'wrong';
    }
    if (extraClass) btn.classList.add(extraClass);

    btn.innerHTML = `<span class="option-label">${labels[i]}</span><span>${opt}</span>`;
    btn.onclick = () => selectOption(i);
    cont.appendChild(btn);
  });

  // Feedback
  const fb = document.getElementById('feedbackBox');
  const fi = document.getElementById('feedbackIcon');
  const ft = document.getElementById('feedbackText');
  fb.className = 'feedback-box';

  if (answered[current] !== null) {
    if (answered[current] === q.correct) {
      fb.classList.add('show', 'correct');
      fi.textContent = '✓';
      ft.textContent = '¡Correcto! Bien hecho.';
    } else {
      fb.classList.add('show', 'wrong');
      fi.textContent = '✗';
      ft.innerHTML = `Incorrecto. La respuesta correcta es: <strong>${labels[q.correct]}. ${q.options[q.correct]}</strong>`;
    }
  }

  document.getElementById('prevBtn').disabled = current === 0;

  const nextBtn = document.getElementById('nextBtn');
  if (current === total - 1) {
    nextBtn.textContent = 'Ver resultado';
  } else {
    nextBtn.textContent = 'Siguiente →';
  }
}

function selectOption(i) {
  if (answered[current] !== null) return;
  answered[current] = i;
  saveState();
  render();
}

function nextQuestion() {
  if (current < questions.length - 1) {
    current++;
    saveState();
    render();
  } else {
    showResults();
  }
}

function prevQuestion() {
  if (current > 0) { current--; saveState(); render(); }
}

function showResults() {
  document.getElementById('quizArea').classList.add('hide');
  const rs = document.getElementById('resultsScreen');
  rs.classList.add('show');

  const total = questions.length;
  const correct = answered.filter((a, i) => a === questions[i].correct).length;
  const wrong = answered.filter((a, i) => a !== null && a !== questions[i].correct).length;
  const pct = Math.round(correct / total * 100);

  document.getElementById('resultsPct').textContent = pct + '%';
  document.getElementById('rCorrect').textContent = correct;
  document.getElementById('rWrong').textContent = wrong;
  document.getElementById('rTotal').textContent = total;

  let msg = '';
  if (pct >= 90) msg = '¡Excelente! Dominio sobresaliente del tema.';
  else if (pct >= 75) msg = 'Muy bien. Conocimiento sólido.';
  else if (pct >= 60) msg = 'Bien. Repasar los temas donde fallaste.';
  else msg = 'Seguí estudiando. ¡Podés mejorar!';
  document.getElementById('resultsMsg').textContent = msg;
}

function confirmRestart() {
  if (confirm('¿Seguro que querés reiniciar? Se borrará todo tu progreso.')) {
    restartQuiz();
  }
}

function restartQuiz() {
  current = 0;
  answered = new Array(questions.length).fill(null);
  localStorage.removeItem(LS_KEY);
  document.getElementById('quizArea').classList.remove('hide');
  document.getElementById('resultsScreen').classList.remove('show');
  document.getElementById('restoreBanner').classList.remove('show');
  render();
}

// init — restaurar progreso o empezar desde cero
const hadSaved = loadState();
if (hadSaved) {
  document.getElementById('restoreBanner').classList.add('show');
}
render();
</script>
</body>
</html>
