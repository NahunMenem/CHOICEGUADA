<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Emergencias Pediátricas</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .container {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 36px;
    max-width: 780px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  .header {
    text-align: center;
    margin-bottom: 28px;
  }

  .header-logo {
    display: block;
    margin: 0 auto 14px;
    max-height: 60px;
    width: auto;
    object-fit: contain;
  }

  .header h1 {
    color: #e2e8f0;
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }

  .header p {
    color: #94a3b8;
    font-size: 0.85rem;
  }

  .progress-bar-wrap {
    background: rgba(255,255,255,0.1);
    border-radius: 50px;
    height: 8px;
    margin-bottom: 6px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #6366f1, #a78bfa);
    border-radius: 50px;
    transition: width 0.4s ease;
  }

  .progress-text {
    display: flex;
    justify-content: space-between;
    color: #94a3b8;
    font-size: 0.78rem;
    margin-bottom: 22px;
  }

  .topic-badge {
    display: inline-block;
    background: rgba(99,102,241,0.25);
    color: #a5b4fc;
    border: 1px solid rgba(99,102,241,0.4);
    border-radius: 50px;
    padding: 4px 14px;
    font-size: 0.75rem;
    font-weight: 600;
    margin-bottom: 14px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .question-text {
    color: #e2e8f0;
    font-size: 1.1rem;
    font-weight: 500;
    line-height: 1.6;
    margin-bottom: 24px;
    min-height: 56px;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 28px;
  }

  .option-btn {
    background: rgba(255,255,255,0.06);
    border: 2px solid rgba(255,255,255,0.12);
    border-radius: 12px;
    padding: 14px 18px;
    text-align: left;
    color: #cbd5e1;
    font-size: 0.97rem;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .option-btn:hover:not(:disabled) {
    background: rgba(99,102,241,0.18);
    border-color: rgba(99,102,241,0.5);
    color: #e2e8f0;
    transform: translateX(4px);
  }

  .option-label {
    background: rgba(255,255,255,0.1);
    border-radius: 8px;
    width: 30px;
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 0.85rem;
    flex-shrink: 0;
    transition: all 0.2s;
  }

  .option-btn.correct {
    background: rgba(34,197,94,0.2);
    border-color: #22c55e;
    color: #86efac;
  }

  .option-btn.correct .option-label {
    background: #22c55e;
    color: #fff;
  }

  .option-btn.wrong {
    background: rgba(239,68,68,0.2);
    border-color: #ef4444;
    color: #fca5a5;
  }

  .option-btn.wrong .option-label {
    background: #ef4444;
    color: #fff;
  }

  .option-btn:disabled {
    cursor: default;
  }

  .feedback-box {
    border-radius: 12px;
    padding: 14px 18px;
    margin-bottom: 22px;
    font-size: 0.93rem;
    font-weight: 500;
    display: none;
    align-items: flex-start;
    gap: 10px;
  }

  .feedback-box.show { display: flex; }

  .feedback-box.correct {
    background: rgba(34,197,94,0.15);
    border: 1px solid rgba(34,197,94,0.35);
    color: #86efac;
  }

  .feedback-box.wrong {
    background: rgba(239,68,68,0.15);
    border: 1px solid rgba(239,68,68,0.35);
    color: #fca5a5;
  }

  .feedback-icon { font-size: 1.2rem; flex-shrink: 0; }

  .feedback-text { line-height: 1.5; }

  .nav-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }

  .btn {
    border: none;
    border-radius: 10px;
    padding: 12px 24px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-secondary {
    background: rgba(255,255,255,0.08);
    color: #94a3b8;
    border: 1px solid rgba(255,255,255,0.12);
  }

  .btn-secondary:hover:not(:disabled) {
    background: rgba(255,255,255,0.14);
    color: #cbd5e1;
  }

  .btn-secondary:disabled { opacity: 0.35; cursor: default; }

  .btn-primary {
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: #fff;
    box-shadow: 0 4px 14px rgba(99,102,241,0.35);
  }

  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 18px rgba(99,102,241,0.5);
  }

  .score-chip {
    background: rgba(99,102,241,0.2);
    border: 1px solid rgba(99,102,241,0.35);
    border-radius: 50px;
    color: #a5b4fc;
    font-size: 0.85rem;
    font-weight: 600;
    padding: 6px 16px;
  }

  .btn-reset {
    background: rgba(239,68,68,0.12);
    color: #f87171;
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 10px;
    padding: 7px 14px;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .btn-reset:hover {
    background: rgba(239,68,68,0.22);
    border-color: rgba(239,68,68,0.5);
  }

  .restore-banner {
    background: rgba(99,102,241,0.12);
    border: 1px solid rgba(99,102,241,0.3);
    border-radius: 10px;
    color: #a5b4fc;
    font-size: 0.83rem;
    padding: 10px 14px;
    margin-bottom: 16px;
    display: none;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }

  .restore-banner.show { display: flex; }

  /* Results screen */
  .results {
    text-align: center;
    display: none;
  }

  .results.show { display: block; }

  .results-score {
    font-size: 5rem;
    font-weight: 800;
    background: linear-gradient(135deg, #6366f1, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin: 16px 0 8px;
  }

  .results-label {
    color: #94a3b8;
    font-size: 1rem;
    margin-bottom: 24px;
  }

  .results-detail {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }

  .results-stat {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    padding: 16px 24px;
    min-width: 130px;
  }

  .results-stat-num {
    font-size: 2rem;
    font-weight: 700;
    color: #e2e8f0;
  }

  .results-stat-num.green { color: #4ade80; }
  .results-stat-num.red { color: #f87171; }

  .results-stat-label {
    color: #64748b;
    font-size: 0.8rem;
    margin-top: 4px;
  }

  .results h2 {
    color: #e2e8f0;
    font-size: 1.6rem;
    margin-bottom: 8px;
  }

  .quiz-area { display: block; }
  .quiz-area.hide { display: none; }
</style>
</head>
<body>
<div class="container">

  <!-- Quiz Area -->
  <div class="quiz-area" id="quizArea">
    <div class="header">
      <img src="DOCYAPRO_BLANCO_eerxi3.png" alt="Logo" class="header-logo">
      <h1>Emergencias Pediátricas</h1>
      <p>Seleccioná la respuesta correcta</p>
      <p style="margin-top:8px; color:#f9a8d4; font-size:0.82rem; letter-spacing:0.3px;">con amor, Nahun ❤️</p>
    </div>

    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="progress-text">
      <span id="progressLabel">Pregunta 1 de 100</span>
      <span id="scoreLabel">Puntaje: 0</span>
    </div>

    <div class="restore-banner" id="restoreBanner">
      <span>📂 Progreso guardado restaurado</span>
      <button class="btn-reset" onclick="confirmRestart()">🗑 Reiniciar todo</button>
    </div>

    <div class="topic-badge" id="topicBadge">Tema</div>
    <div class="question-text" id="questionText"></div>

    <div class="options" id="optionsContainer"></div>

    <div class="feedback-box" id="feedbackBox">
      <span class="feedback-icon" id="feedbackIcon"></span>
      <span class="feedback-text" id="feedbackText"></span>
    </div>

    <div class="nav-row">
      <button class="btn btn-secondary" id="prevBtn" onclick="prevQuestion()">← Anterior</button>
      <span class="score-chip" id="scoreChip">0 / 0</span>
      <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()">Siguiente →</button>
    </div>

    <div style="text-align:center; margin-top:16px;">
      <button class="btn-reset" onclick="confirmRestart()" style="margin:0 auto;">🗑 Reiniciar todo</button>
    </div>
  </div>

  <!-- Results Screen -->
  <div class="results" id="resultsScreen">
    <h2>Resultado Final</h2>
    <div class="results-score" id="resultsPct"></div>
    <div class="results-label" id="resultsMsg"></div>
    <div class="results-detail">
      <div class="results-stat">
        <div class="results-stat-num green" id="rCorrect"></div>
        <div class="results-stat-label">Correctas</div>
      </div>
      <div class="results-stat">
        <div class="results-stat-num red" id="rWrong"></div>
        <div class="results-stat-label">Incorrectas</div>
      </div>
      <div class="results-stat">
        <div class="results-stat-num" id="rTotal" style="color:#a5b4fc"></div>
        <div class="results-stat-label">Total</div>
      </div>
    </div>
    <button class="btn btn-primary" onclick="restartQuiz()" style="margin:0 auto;display:block;padding:14px 40px;">Reiniciar Quiz</button>
  </div>

</div>

<script>
const questions = [
  // ── TEC ──────────────────────────────────────────────────────────────
  {
    topic:"TEC",
    q:"En PECARN para <2 años, los 2 factores de ALTO riesgo que indican TC inmediata (sin observación) son:",
    options:["Vómitos + cefalea persistente >1 h","Estado mental alterado O fractura de cráneo palpable","Hematoma occipital aislado + irritabilidad","Pérdida de conciencia >5 s + vómito único"],
    correct:1
  },
  {
    topic:"TEC",
    q:"El objetivo de Presión de Perfusión Cerebral (PPC) en TEC grave en escolares de 6–17 años según guías actuales es:",
    options:["≥40 mmHg","≥50 mmHg","≥60 mmHg","≥80 mmHg"],
    correct:2
  },
  {
    topic:"TEC",
    q:"En TEC grave con herniación inminente, la hiperventilación de RESCATE (transitoria) apunta a PaCO₂ de:",
    options:["20–25 mmHg","30–35 mmHg","38–42 mmHg","45–50 mmHg"],
    correct:1
  },
  {
    topic:"TEC",
    q:"La ventaja principal de la solución salina hipertónica (SSH) sobre el manitol en TEC grave con hipovolemia es:",
    options:["No produce diuresis osmótica significativa y puede expandir el volumen intravascular, mientras el manitol agrava la hipovolemia","Mayor potencia osmótica por molécula (menor volumen de infusión)","No requiere control de osmolaridad sérica","Menor riesgo de rebote de la PIC a las 4 horas"],
    correct:0
  },
  {
    topic:"TEC",
    q:"En TEC no accidental (síndrome del niño sacudido), el hallazgo oftalmológico más específico es:",
    options:["Papiledema bilateral aislado","Hemorragias retinianas multilaminares bilaterales","Neuropatía óptica isquémica unilateral","Luxación del cristalino"],
    correct:1
  },
  {
    topic:"TEC",
    q:"La hiperventilación PROFILÁCTICA crónica en TEC grave está contraindicada porque:",
    options:["Produce alcalosis metabólica compensadora que agrava el edema cerebral","Aumenta la PIC por vasodilatación refleja posterior","Es ineficaz en menores de 2 años únicamente","Genera vasoconstricción cerebral sostenida que reduce el FSC y puede causar isquemia secundaria"],
    correct:3
  },
  {
    topic:"TEC",
    q:"Ante alta sospecha clínica de TEC no accidental, el estudio de neuroimagen de PRIMERA elección es:",
    options:["TC cráneo sin contraste + RM diferida 24–72 h para detectar lesiones en distintos estadios","Eco transfontanelar aislado","RM cráneo urgente como único estudio inicial","Rx cráneo AP y lateral"],
    correct:0
  },
  // ── CONVULSIONES ─────────────────────────────────────────────────────
  {
    topic:"Convulsiones",
    q:"El síndrome de Ohtahara (encefalopatía epiléptica neonatal precoz) se caracteriza por el patrón EEG:",
    options:["Hipsarritmia generalizada","Punta-onda lenta continua durante el sueño (CSWS)","Spike-wave 3 Hz generalizado en vigilia","Patrón de supresión-brote (burst-suppression)"],
    correct:3
  },
  {
    topic:"Convulsiones",
    q:"Ante una primera crisis febril SIMPLE en un niño de 18 meses, la indicación de EEG es:",
    options:["No está indicado de rutina; la primera crisis febril simple no requiere EEG","Solo si hay antecedentes familiares de epilepsia en primer grado","Siempre a las 4–6 semanas del episodio","Si la temperatura superó los 40°C"],
    correct:0
  },
  {
    topic:"Convulsiones",
    q:"La dosis de carga de ácido valproico IV en status epilepticus refractario pediátrico es:",
    options:["10 mg/kg en bolo de 5 min","15 mg/kg en infusión de 30 min","20–40 mg/kg a 3–6 mg/kg/min","60 mg/kg en bolo único"],
    correct:2
  },
  {
    topic:"Convulsiones",
    q:"El síndrome de West tiene mejor pronóstico cuando:",
    options:["El EEG muestra hipsarritmia simétrica sin supresión","Se diagnostica y trata precozmente antes de los 3 meses del inicio de espasmos (ACTH o vigabatrina)","Se asocia a esclerosis tuberosa con tuberomas corticales múltiples","El inicio ocurre antes de los 3 meses de vida"],
    correct:1
  },
  {
    topic:"Convulsiones",
    q:"La ketamina puede usarse en status epilepticus superrefractario porque su mecanismo es:",
    options:["Potenciación GABAérgica igual que las benzodiacepinas","Bloqueo de canales de sodio voltaje-dependientes, sin cruce de tolerancia","Inhibición de la liberación de glutamato presináptico","Antagonismo NMDA, mecanismo diferente a BZD y barbitúricos, útil en status refractario"],
    correct:3
  },
  {
    topic:"Convulsiones",
    q:"El síndrome de Lennox-Gastaut se define por la tríada:",
    options:["Crisis múltiples (tónicas, atónicas, ausencias atípicas) + EEG con punta-onda lenta <2.5 Hz + deterioro cognitivo","Espasmos infantiles + hipsarritmia + regresión del desarrollo","Ausencias típicas + punta-onda 3 Hz + inteligencia conservada","Mioclonías masivas + crisis TCG + EEG fotosensible en adolescente"],
    correct:0
  },
  {
    topic:"Convulsiones",
    q:"El riesgo de desarrollar epilepsia tras un PRIMER episodio de status epilepticus febril prolongado (FEBSTAT) es aproximadamente:",
    options:["1–2% (similar a la población general)","5–8%","20–35% (significativamente elevado respecto a la población general)","Más del 80% en todos los casos"],
    correct:2
  },
  // ── QUEMADURAS ────────────────────────────────────────────────────────
  {
    topic:"Quemaduras",
    q:"La fórmula de Galveston (específica para pediatría) difiere de Parkland en que agrega:",
    options:["Coloides desde las primeras 8 h para mantener la presión oncótica","Un componente de mantenimiento basal por superficie corporal total (1500 ml/m²) además del componente de reposición por quemadura","Albúmina al 5% como fluido principal desde las 12 h","Glucosa en todos los fluidos para prevenir hipoglucemia"],
    correct:1
  },
  {
    topic:"Quemaduras",
    q:"La quemadura de TERCER grado se caracteriza por:",
    options:["Ampollas con base rosada húmeda y dolor intenso al tacto","Eritema sin ampollas, dolorosa y con relleno capilar <2 s","Destrucción total del espesor dérmico, piel acartonada/coriácea, indolora, con trombosis venosas visibles","Necrosis epidérmica superficial con dermis intacta"],
    correct:2
  },
  {
    topic:"Quemaduras",
    q:"En un niño con estridor progresivo y chamuscado de vibrisas nasales tras incendio cerrado, la prioridad inmediata es:",
    options:["Intubación orotraqueal precoz antes de que el edema progresivo obstruya la vía aérea","Adrenalina nebulizada + corticoide IV y reevaluar en 2 h","Broncoscopía flexible urgente para valorar el daño","Traqueotomía de urgencia como primer paso"],
    correct:0
  },
  {
    topic:"Quemaduras",
    q:"En la tabla de Lund-Browder, la cabeza de un lactante de 12 meses representa aproximadamente:",
    options:["9% (igual que en adulto)","13%","18% (aproximadamente el doble que en adulto)","25%"],
    correct:2
  },
  {
    topic:"Quemaduras",
    q:"La profilaxis antibiótica sistémica de rutina en quemaduras NO está recomendada porque:",
    options:["Los antibióticos no alcanzan la zona quemada por trombosis vascular local","Favorece la selección de gérmenes multirresistentes sin reducir la tasa de infección","Solo se indica en quemaduras >50% SCQ en UCI","El riesgo infeccioso en las primeras 72 h es despreciable"],
    correct:1
  },
  // ── SEPSIS ────────────────────────────────────────────────────────────
  {
    topic:"Sepsis",
    q:"Según el Surviving Sepsis Campaign pediátrico 2020, los antibióticos IV en shock séptico deben administrarse:",
    options:["Dentro de las 3 h del reconocimiento","Dentro de la primera hora del reconocimiento de shock séptico","Solo tras obtener al menos 2 hemocultivos de sitios distintos","Cuando el lactato supere 4 mmol/L"],
    correct:2
  },
  {
    topic:"Sepsis",
    q:"El marcador con mayor ESPECIFICIDAD para diferenciar sepsis bacteriana de viral en pediatría es:",
    options:["PCR >100 mg/L","Leucocitosis >15.000/mm³ con desviación izquierda","Fiebre >39.5°C de inicio brusco con escalofríos","Procalcitonina (PCT) >2 ng/mL"],
    correct:3
  },
  {
    topic:"Sepsis",
    q:"El esquema antibiótico empírico de elección en SEPSIS NEONATAL DE INICIO PRECOZ (<72 h de vida) es:",
    options:["Ampicilina + aminoglucósido (cubre SGB, Listeria y E. coli)","Ceftriaxona + vancomicina","Piperacilina-tazobactam en monoterapia","Cefotaxima + metronidazol"],
    correct:0
  },
  {
    topic:"Sepsis",
    q:"¿Cuál de los siguientes contactos de un caso de meningococcemia NO requiere quimioprofilaxis?",
    options:["Familiar conviviente en el mismo hogar","Compañero de clase con contacto casual, sin exposición cara a cara íntima (<1 m) ni convivencia","Personal de salud que realizó intubación sin mascarilla","Pareja con contacto íntimo (beso) en los 7 días previos"],
    correct:1
  },
  {
    topic:"Sepsis",
    q:"El score de disfunción orgánica pediátrico más utilizado en UCIP para cuantificar morbimortalidad en sepsis es:",
    options:["APACHE II pediátrico adaptado","SOFA adulto con corrección por edad","PELOD-2 (Pediatric Logistic Organ Dysfunction-2)","PRISM III"],
    correct:2
  },
  {
    topic:"Sepsis",
    q:"En shock séptico refractario con fracción de eyección ventricular izquierda <35% en ecocardiograma, el soporte vasoactivo preferido es:",
    options:["Noradrenalina en altas dosis como único agente","Vasopresina en infusión continua","Adrenalina sola","Milrinona (inodilatador) ± noradrenalina si persiste hipotensión"],
    correct:3
  },
  // ── SÍNCOPE ───────────────────────────────────────────────────────────
  {
    topic:"Síncope",
    q:"El valor de QTc considerado PATOLÓGICO en niños escolares es:",
    options:[">460 ms en niñas o >440 ms en varones prepúberes",">500 ms en todos los niños independiente del sexo",">420 ms como valor único universal",">480 ms solo si hay síntomas asociados"],
    correct:0
  },
  {
    topic:"Síncope",
    q:"El síncope durante natación en un niño de 10 años, con ecocardiograma normal, hace sospechar principalmente:",
    options:["Síncope vasovagal por esfuerzo intenso","LQT2 (desencadenado por estímulo auditivo brusco)","LQT1 (el ejercicio y especialmente la natación es el trigger característico)","Síndrome de Brugada desencadenado por el frío del agua"],
    correct:2
  },
  {
    topic:"Síncope",
    q:"En síndrome de WPW con taquicardia por fibrilación auricular, el fármaco CONTRAINDICADO es:",
    options:["Adenosina IV a dosis habitual","Maniobras vagales como primera maniobra","Cardioversión eléctrica sincronizada si hay inestabilidad","Verapamilo IV (bloquea el nodo AV pero puede acelerar la conducción por la vía accesoria precipitando FV)"],
    correct:3
  },
  {
    topic:"Síncope",
    q:"El patrón de Brugada DIAGNÓSTICO (tipo 1 o 'coved') en V1-V2 consiste en:",
    options:["Elevación convexa del ST con onda T positiva ('en silla de montar') ≥2 mm","Elevación del ST ≥2 mm en forma de bóveda descendente con onda T negativa","Depresión difusa del ST con ondas T negativas simétricas en V1-V3","Patrón de BRD completo con QRS >120 ms sin elevación del ST"],
    correct:1
  },
  {
    topic:"Síncope",
    q:"Las maniobras vagales (Valsalva, inmersión facial en frío) revierten la TSV porque:",
    options:["Estimulan el nervio vago aumentando la conducción nodal AV y frenando la taquicardia","Producen vasoconstricción periférica que aumenta la postcarga ventricular","Bloquean directamente los canales de calcio tipo L en el nodo AV","Inhiben la corriente If del nodo sinusal reduciendo el automatismo"],
    correct:0
  },

// ── LocalStorage ───────────────────────────────────────────────────────────
const LS_KEY = 'quiz_guada_state';

function saveState() {
  localStorage.setItem(LS_KEY, JSON.stringify({ current, answered }));
}

function loadState() {
  try {
    const saved = JSON.parse(localStorage.getItem(LS_KEY));
    if (saved && Array.isArray(saved.answered) && saved.answered.length === questions.length) {
      current = saved.current ?? 0;
      answered = saved.answered;
      return true;
    }
  } catch(e) {}
  return false;
}

// ── State ──────────────────────────────────────────────────────────────────
let current = 0;
let answered = new Array(questions.length).fill(null);

function render() {
  const q = questions[current];
  const total = questions.length;

  document.getElementById('progressBar').style.width = ((current + 1) / total * 100) + '%';
  document.getElementById('progressLabel').textContent = `Pregunta ${current + 1} de ${total}`;

  const correct = answered.filter((a, i) => a === questions[i].correct).length;
  const attempted = answered.filter(a => a !== null).length;
  document.getElementById('scoreLabel').textContent = `Correctas: ${correct}`;
  document.getElementById('scoreChip').textContent = `${correct} / ${attempted}`;

  document.getElementById('topicBadge').textContent = q.topic;
  document.getElementById('questionText').textContent = `${current + 1}. ${q.q}`;

  const labels = ['A', 'B', 'C', 'D'];
  const cont = document.getElementById('optionsContainer');
  cont.innerHTML = '';

  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.disabled = answered[current] !== null;

    let extraClass = '';
    if (answered[current] !== null) {
      if (i === q.correct) extraClass = 'correct';
      else if (i === answered[current]) extraClass = 'wrong';
    }
    if (extraClass) btn.classList.add(extraClass);

    btn.innerHTML = `<span class="option-label">${labels[i]}</span><span>${opt}</span>`;
    btn.onclick = () => selectOption(i);
    cont.appendChild(btn);
  });

  // Feedback
  const fb = document.getElementById('feedbackBox');
  const fi = document.getElementById('feedbackIcon');
  const ft = document.getElementById('feedbackText');
  fb.className = 'feedback-box';

  if (answered[current] !== null) {
    if (answered[current] === q.correct) {
      fb.classList.add('show', 'correct');
      fi.textContent = '✓';
      ft.textContent = '¡Correcto! Bien hecho.';
    } else {
      fb.classList.add('show', 'wrong');
      fi.textContent = '✗';
      ft.innerHTML = `Incorrecto. La respuesta correcta es: <strong>${labels[q.correct]}. ${q.options[q.correct]}</strong>`;
    }
  }

  document.getElementById('prevBtn').disabled = current === 0;

  const nextBtn = document.getElementById('nextBtn');
  if (current === total - 1) {
    nextBtn.textContent = 'Ver resultado';
  } else {
    nextBtn.textContent = 'Siguiente →';
  }
}

function selectOption(i) {
  if (answered[current] !== null) return;
  answered[current] = i;
  saveState();
  render();
}

function nextQuestion() {
  if (current < questions.length - 1) {
    current++;
    saveState();
    render();
  } else {
    showResults();
  }
}

function prevQuestion() {
  if (current > 0) { current--; saveState(); render(); }
}

function showResults() {
  document.getElementById('quizArea').classList.add('hide');
  const rs = document.getElementById('resultsScreen');
  rs.classList.add('show');

  const total = questions.length;
  const correct = answered.filter((a, i) => a === questions[i].correct).length;
  const wrong = answered.filter((a, i) => a !== null && a !== questions[i].correct).length;
  const pct = Math.round(correct / total * 100);

  document.getElementById('resultsPct').textContent = pct + '%';
  document.getElementById('rCorrect').textContent = correct;
  document.getElementById('rWrong').textContent = wrong;
  document.getElementById('rTotal').textContent = total;

  let msg = '';
  if (pct >= 90) msg = '¡Excelente! Dominio sobresaliente del tema.';
  else if (pct >= 75) msg = 'Muy bien. Conocimiento sólido.';
  else if (pct >= 60) msg = 'Bien. Repasar los temas donde fallaste.';
  else msg = 'Seguí estudiando. ¡Podés mejorar!';
  document.getElementById('resultsMsg').textContent = msg;
}

function confirmRestart() {
  if (confirm('¿Seguro que querés reiniciar? Se borrará todo tu progreso.')) {
    restartQuiz();
  }
}

function restartQuiz() {
  current = 0;
  answered = new Array(questions.length).fill(null);
  localStorage.removeItem(LS_KEY);
  document.getElementById('quizArea').classList.remove('hide');
  document.getElementById('resultsScreen').classList.remove('show');
  document.getElementById('restoreBanner').classList.remove('show');
  render();
}

// init — restaurar progreso o empezar desde cero
const hadSaved = loadState();
if (hadSaved) {
  document.getElementById('restoreBanner').classList.add('show');
}
render();
</script>
