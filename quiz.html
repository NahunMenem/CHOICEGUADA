<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Emergencias Pediátricas</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .container {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 36px;
    max-width: 780px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  .header {
    text-align: center;
    margin-bottom: 28px;
  }

  .header-logo {
    display: block;
    margin: 0 auto 14px;
    max-height: 60px;
    width: auto;
    object-fit: contain;
  }

  .header h1 {
    color: #e2e8f0;
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }

  .header p {
    color: #94a3b8;
    font-size: 0.85rem;
  }

  .progress-bar-wrap {
    background: rgba(255,255,255,0.1);
    border-radius: 50px;
    height: 8px;
    margin-bottom: 6px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #6366f1, #a78bfa);
    border-radius: 50px;
    transition: width 0.4s ease;
  }

  .progress-text {
    display: flex;
    justify-content: space-between;
    color: #94a3b8;
    font-size: 0.78rem;
    margin-bottom: 22px;
  }

  .topic-badge {
    display: inline-block;
    background: rgba(99,102,241,0.25);
    color: #a5b4fc;
    border: 1px solid rgba(99,102,241,0.4);
    border-radius: 50px;
    padding: 4px 14px;
    font-size: 0.75rem;
    font-weight: 600;
    margin-bottom: 14px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .question-text {
    color: #e2e8f0;
    font-size: 1.1rem;
    font-weight: 500;
    line-height: 1.6;
    margin-bottom: 24px;
    min-height: 56px;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 28px;
  }

  .option-btn {
    background: rgba(255,255,255,0.06);
    border: 2px solid rgba(255,255,255,0.12);
    border-radius: 12px;
    padding: 14px 18px;
    text-align: left;
    color: #cbd5e1;
    font-size: 0.97rem;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .option-btn:hover:not(:disabled) {
    background: rgba(99,102,241,0.18);
    border-color: rgba(99,102,241,0.5);
    color: #e2e8f0;
    transform: translateX(4px);
  }

  .option-label {
    background: rgba(255,255,255,0.1);
    border-radius: 8px;
    width: 30px;
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 0.85rem;
    flex-shrink: 0;
    transition: all 0.2s;
  }

  .option-btn.correct {
    background: rgba(34,197,94,0.2);
    border-color: #22c55e;
    color: #86efac;
  }

  .option-btn.correct .option-label {
    background: #22c55e;
    color: #fff;
  }

  .option-btn.wrong {
    background: rgba(239,68,68,0.2);
    border-color: #ef4444;
    color: #fca5a5;
  }

  .option-btn.wrong .option-label {
    background: #ef4444;
    color: #fff;
  }

  .option-btn:disabled {
    cursor: default;
  }

  .feedback-box {
    border-radius: 12px;
    padding: 14px 18px;
    margin-bottom: 22px;
    font-size: 0.93rem;
    font-weight: 500;
    display: none;
    align-items: flex-start;
    gap: 10px;
  }

  .feedback-box.show { display: flex; }

  .feedback-box.correct {
    background: rgba(34,197,94,0.15);
    border: 1px solid rgba(34,197,94,0.35);
    color: #86efac;
  }

  .feedback-box.wrong {
    background: rgba(239,68,68,0.15);
    border: 1px solid rgba(239,68,68,0.35);
    color: #fca5a5;
  }

  .feedback-icon { font-size: 1.2rem; flex-shrink: 0; }

  .feedback-text { line-height: 1.5; }

  .nav-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }

  .btn {
    border: none;
    border-radius: 10px;
    padding: 12px 24px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-secondary {
    background: rgba(255,255,255,0.08);
    color: #94a3b8;
    border: 1px solid rgba(255,255,255,0.12);
  }

  .btn-secondary:hover:not(:disabled) {
    background: rgba(255,255,255,0.14);
    color: #cbd5e1;
  }

  .btn-secondary:disabled { opacity: 0.35; cursor: default; }

  .btn-primary {
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: #fff;
    box-shadow: 0 4px 14px rgba(99,102,241,0.35);
  }

  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 18px rgba(99,102,241,0.5);
  }

  .score-chip {
    background: rgba(99,102,241,0.2);
    border: 1px solid rgba(99,102,241,0.35);
    border-radius: 50px;
    color: #a5b4fc;
    font-size: 0.85rem;
    font-weight: 600;
    padding: 6px 16px;
  }

  .btn-reset {
    background: rgba(239,68,68,0.12);
    color: #f87171;
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 10px;
    padding: 7px 14px;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .btn-reset:hover {
    background: rgba(239,68,68,0.22);
    border-color: rgba(239,68,68,0.5);
  }

  .restore-banner {
    background: rgba(99,102,241,0.12);
    border: 1px solid rgba(99,102,241,0.3);
    border-radius: 10px;
    color: #a5b4fc;
    font-size: 0.83rem;
    padding: 10px 14px;
    margin-bottom: 16px;
    display: none;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }

  .restore-banner.show { display: flex; }

  /* Results screen */
  .results {
    text-align: center;
    display: none;
  }

  .results.show { display: block; }

  .results-score {
    font-size: 5rem;
    font-weight: 800;
    background: linear-gradient(135deg, #6366f1, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin: 16px 0 8px;
  }

  .results-label {
    color: #94a3b8;
    font-size: 1rem;
    margin-bottom: 24px;
  }

  .results-detail {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }

  .results-stat {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    padding: 16px 24px;
    min-width: 130px;
  }

  .results-stat-num {
    font-size: 2rem;
    font-weight: 700;
    color: #e2e8f0;
  }

  .results-stat-num.green { color: #4ade80; }
  .results-stat-num.red { color: #f87171; }

  .results-stat-label {
    color: #64748b;
    font-size: 0.8rem;
    margin-top: 4px;
  }

  .results h2 {
    color: #e2e8f0;
    font-size: 1.6rem;
    margin-bottom: 8px;
  }

  .quiz-area { display: block; }
  .quiz-area.hide { display: none; }
</style>
</head>
<body>
<div class="container">

  <!-- Quiz Area -->
  <div class="quiz-area" id="quizArea">
    <div class="header">
      <img src="DOCYAPRO_BLANCO_eerxi3.png" alt="Logo" class="header-logo">
      <h1>Emergencias Pediátricas</h1>
      <p>Seleccioná la respuesta correcta</p>
      <p style="margin-top:8px; color:#f9a8d4; font-size:0.82rem; letter-spacing:0.3px;">con amor, Nahun ❤️</p>
    </div>

    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="progress-text">
      <span id="progressLabel">Pregunta 1 de 100</span>
      <span id="scoreLabel">Puntaje: 0</span>
    </div>

    <div class="restore-banner" id="restoreBanner">
      <span>📂 Progreso guardado restaurado</span>
      <button class="btn-reset" onclick="confirmRestart()">🗑 Reiniciar todo</button>
    </div>

    <div class="topic-badge" id="topicBadge">Tema</div>
    <div class="question-text" id="questionText"></div>

    <div class="options" id="optionsContainer"></div>

    <div class="feedback-box" id="feedbackBox">
      <span class="feedback-icon" id="feedbackIcon"></span>
      <span class="feedback-text" id="feedbackText"></span>
    </div>

    <div class="nav-row">
      <button class="btn btn-secondary" id="prevBtn" onclick="prevQuestion()">← Anterior</button>
      <span class="score-chip" id="scoreChip">0 / 0</span>
      <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()">Siguiente →</button>
    </div>

    <div style="text-align:center; margin-top:16px;">
      <button class="btn-reset" onclick="confirmRestart()" style="margin:0 auto;">🗑 Reiniciar todo</button>
    </div>
  </div>

  <!-- Results Screen -->
  <div class="results" id="resultsScreen">
    <h2>Resultado Final</h2>
    <div class="results-score" id="resultsPct"></div>
    <div class="results-label" id="resultsMsg"></div>
    <div class="results-detail">
      <div class="results-stat">
        <div class="results-stat-num green" id="rCorrect"></div>
        <div class="results-stat-label">Correctas</div>
      </div>
      <div class="results-stat">
        <div class="results-stat-num red" id="rWrong"></div>
        <div class="results-stat-label">Incorrectas</div>
      </div>
      <div class="results-stat">
        <div class="results-stat-num" id="rTotal" style="color:#a5b4fc"></div>
        <div class="results-stat-label">Total</div>
      </div>
    </div>
    <button class="btn btn-primary" onclick="restartQuiz()" style="margin:0 auto;display:block;padding:14px 40px;">Reiniciar Quiz</button>
  </div>

</div>

<script>
const questions = [
  // ── TEC ──────────────────────────────────────────────────────────────
  {
    topic: "TEC",
    q: "Según PECARN, en menores de 2 años con TEC, ¿cuál hallazgo es de ALTO riesgo y justifica TC directa sin período de observación?",
    options: [
      "Vómitos aislados una sola vez sin otros signos",
      "Estado mental alterado O fractura de cráneo palpable",
      "Otorragia sin pérdida de conciencia",
      "Cefalea leve sin otros hallazgos"
    ],
    correct: 1
  },
  {
    topic: "TEC",
    q: "En TEC grave pediátrico, el objetivo de Presión de Perfusión Cerebral (PPC) recomendado en escolares de 6-17 años es:",
    options: ["≥40 mmHg", "≥50 mmHg", "≥60 mmHg", "≥80 mmHg"],
    correct: 2
  },
  {
    topic: "TEC",
    q: "En TEC grave con herniación inminente, la hiperventilación de rescate se usa transitoriamente. El objetivo de PaCO₂ durante esta maniobra es:",
    options: ["20–25 mmHg", "30–35 mmHg", "35–40 mmHg", "40–45 mmHg"],
    correct: 1
  },
  {
    topic: "TEC",
    q: "Respecto al uso de solución salina hipertónica (SSH) vs manitol en HEC pediátrica, es CORRECTO:",
    options: [
      "El manitol está contraindicado en hipovolemia; la SSH puede usarse en ese contexto",
      "El manitol es superior en todos los contextos pediátricos",
      "La SSH no puede usarse si hay trauma múltiple",
      "Ambos tienen exactamente el mismo perfil de seguridad"
    ],
    correct: 0
  },
  {
    topic: "TEC",
    q: "En sospecha de TEC no accidental (síndrome del niño sacudido), el hallazgo oftalmológico más característico es:",
    options: [
      "Papiledema bilateral aislado",
      "Hemorragias retinianas multilaminares bilaterales",
      "Neuropatía óptica isquémica unilateral",
      "Cataratas traumáticas"
    ],
    correct: 1
  },
  {
    topic: "TEC",
    q: "El deterioro neurológico brusco tras intervalo lúcido en TEC, con anisocoria ipsilateral a la lesión y hemiparesia contralateral, sugiere:",
    options: [
      "Hematoma subdural crónico bilateral",
      "Hemorragia subaracnoidea difusa",
      "Hematoma epidural con herniación uncal",
      "Contusión cerebelosa"
    ],
    correct: 2
  },
  {
    topic: "TEC",
    q: "La monitorización invasiva de PIC en TEC grave pediátrico se indica principalmente cuando la GCS es:",
    options: ["≤12 con cualquier TC", "≤10 con TC normal", "≤8 con TC anormal o riesgo de deterioro clínico", "≤6 exclusivamente"],
    correct: 2
  },
  // ── CONVULSIONES ─────────────────────────────────────────────────────
  {
    topic: "Convulsiones",
    q: "El síndrome de Dravet se asocia típicamente a mutaciones en el gen:",
    options: ["KCNQ2", "SCN1A", "CDKL5", "PCDH19"],
    correct: 1
  },
  {
    topic: "Convulsiones",
    q: "En el síndrome de Dravet, el fármaco antiepiléptico CONTRAINDICADO por riesgo de empeoramiento de las crisis es:",
    options: ["Ácido valproico", "Clobazam", "Lamotrigina", "Stiripentol"],
    correct: 2
  },
  {
    topic: "Convulsiones",
    q: "La dosis de midazolam intranasal en status epilepticus pediátrico según guías actuales es:",
    options: ["0.1 mg/kg", "0.2 mg/kg (máx 10 mg)", "0.5 mg/kg", "1 mg/kg"],
    correct: 1
  },
  {
    topic: "Convulsiones",
    q: "El status epilepticus se considera SUPERREFRACTARIO cuando no cede tras:",
    options: [
      "Dos benzodiacepinas",
      "Benzodiacepinas + un antiepiléptico de segunda línea",
      "Benzodiacepinas + dos antiepilépticos de segunda línea + anestesia general IV ≥24 h",
      "30 minutos de convulsión continua"
    ],
    correct: 2
  },
  {
    topic: "Convulsiones",
    q: "FIRES (Febrile Infection-Related Epilepsy Syndrome) se caracteriza por:",
    options: [
      "Status epilepticus febril neonatal por déficit de piridoxina",
      "Status epilepticus refractario en escolares previamente sanos, precedido de fiebre, sin etiología estructural ni autoinmune identificada",
      "Epilepsia mioclónica juvenil post-infecciosa con buen pronóstico",
      "Encefalitis herpética con foco temporal y pleocitosis"
    ],
    correct: 1
  },
  {
    topic: "Convulsiones",
    q: "La dosis de carga de levetiracetam IV en status epilepticus pediátrico es:",
    options: ["10 mg/kg en 5 min", "20–30 mg/kg en 15 min", "60 mg/kg en 5 min", "100 mg/kg en 30 min"],
    correct: 1
  },
  {
    topic: "Convulsiones",
    q: "En crisis neonatal refractaria con posible deficiencia de piridoxina, el cofactor a administrar de prueba es:",
    options: ["Piridoxina (vitamina B6) IV 100 mg", "Biotina IM", "Ácido folínico IV", "Tiamina IV"],
    correct: 0
  },
  {
    topic: "Convulsiones",
    q: "La crisis febril COMPLEJA se diferencia de la simple porque presenta al menos UNO de los siguientes:",
    options: [
      "Temperatura >39°C",
      "Duración >15 min, carácter focal O recurrencia en las 24 h",
      "Edad menor de 18 meses",
      "Ausencia de antecedentes familiares"
    ],
    correct: 1
  },
  // ── QUEMADURAS ────────────────────────────────────────────────────────
  {
    topic: "Quemaduras",
    q: "La tabla de Lund-Browder es superior a la 'regla de los 9' en pediatría porque:",
    options: [
      "Es más rápida de calcular en emergencias",
      "Corrige la mayor proporción relativa de la cabeza y menor de extremidades inferiores según la edad del niño",
      "Solo aplica en mayores de 15 años",
      "Incluye la superficie de las mucosas en el cálculo"
    ],
    correct: 1
  },
  {
    topic: "Quemaduras",
    q: "Usando la fórmula de Parkland, en un niño de 20 kg con 30% de SCQ quemada, ¿cuántos ml de Ringer lactato deben infundirse en las primeras 8 horas?",
    options: ["600 ml", "1200 ml", "2400 ml", "3600 ml"],
    correct: 1
  },
  {
    topic: "Quemaduras",
    q: "La indicación de escarotomía en quemaduras circunferenciales de extremidades se basa en:",
    options: [
      "Extensión mayor del 15% de la SCQ",
      "Síndrome compartimental: presión compartimental >30 mmHg o signos clínicos de isquemia distal",
      "Profundidad de segundo grado superficial",
      "Tiempo de evolución mayor de 6 horas"
    ],
    correct: 1
  },
  {
    topic: "Quemaduras",
    q: "En intoxicación por CO asociada a inhalación de humo, la indicación más establecida de oxígeno hiperbárico es:",
    options: [
      "COHb >10% sin síntomas neurológicos",
      "COHb >25% O síntomas neurológicos (coma, convulsiones, déficit focal) independiente del nivel",
      "SpO₂ <95% con O₂ al 100%",
      "Todo niño menor de 5 años con cualquier nivel de COHb"
    ],
    correct: 1
  },
  {
    topic: "Quemaduras",
    q: "En quemaduras graves que requieren internación prolongada, la alimentación enteral se recomienda iniciar:",
    options: [
      "A las 72 h de estabilización hemodinámica completa",
      "Dentro de las primeras 6–12 h post-quemadura para reducir respuesta hipercatabólica",
      "Solo tras cierre quirúrgico de todas las quemaduras",
      "Cuando la tolerancia oral sea ≥50% de los requerimientos"
    ],
    correct: 1
  },
  // ── SEPSIS ────────────────────────────────────────────────────────────
  {
    topic: "Sepsis",
    q: "En shock séptico pediátrico con presentación 'fría' (extremidades frías, llene capilar >3 s, pulso débil), el vasopresor/inotrópico de primera elección es:",
    options: ["Noradrenalina", "Dobutamina aislada", "Adrenalina", "Vasopresina"],
    correct: 2
  },
  {
    topic: "Sepsis",
    q: "El 'shock caliente' pediátrico (extremidades vasodilatadas, llene <2 s, pulso saltón, PA baja) corresponde fisiológicamente a:",
    options: [
      "Bajo gasto con alta resistencia vascular sistémica",
      "Alto gasto con baja resistencia vascular sistémica",
      "Shock obstructivo por taponamiento",
      "Shock distributivo con vasoconstricción pulmonar"
    ],
    correct: 1
  },
  {
    topic: "Sepsis",
    q: "En sepsis neonatal de inicio tardío (>72 h de vida), el agente etiológico más frecuente es:",
    options: [
      "Streptococcus agalactiae (SGB)",
      "Staphylococcus coagulasa negativo (SCN)",
      "Escherichia coli",
      "Listeria monocytogenes"
    ],
    correct: 1
  },
  {
    topic: "Sepsis",
    q: "En shock séptico refractario a catecolaminas, la hidrocortisona se indica como 'dosis de estrés'. La dosis habitualmente recomendada en pediatría es:",
    options: [
      "0.5 mg/kg/día",
      "2 mg/kg/día (máx 100 mg/día) o 50 mg/m²/día",
      "10 mg/kg en bolo único",
      "1 mg/kg c/6 h IM"
    ],
    correct: 1
  },
  {
    topic: "Sepsis",
    q: "La púrpura fulminante meningocócica produce CID. El tratamiento de la coagulopatía de consumo se prioriza con:",
    options: [
      "Heparina sódica IV continua",
      "Plasma fresco congelado + plaquetas + crioprecipitado según déficit analítico",
      "Ácido tranexámico IV como primera línea",
      "Vitamina K IM exclusivamente"
    ],
    correct: 1
  },
  {
    topic: "Sepsis",
    q: "El objetivo de aclaramiento de lactato en la resucitación de sepsis pediátrica es:",
    options: [
      "Descenso del 10% en 30 minutos",
      "Descenso ≥10% cada 2 h o normalización (<2 mmol/L) en las primeras 6 h",
      "Valor absoluto <4 mmol/L al ingreso",
      "No se usa lactato en pediatría"
    ],
    correct: 1
  },
  // ── SÍNCOPE ───────────────────────────────────────────────────────────
  {
    topic: "Síncope",
    q: "El síndrome de QT largo tipo 1 (LQT1) se precipita principalmente por:",
    options: ["Estímulo auditivo brusco (teléfono, despertador)", "Ejercicio, especialmente natación", "Sueño / reposo nocturno", "Fiebre alta"],
    correct: 1
  },
  {
    topic: "Síncope",
    q: "El síndrome de QT largo tipo 2 (LQT2) se precipita principalmente por:",
    options: ["Ejercicio intenso", "Estímulo auditivo brusco o estrés emocional", "Sueño / bradicardia nocturna", "Frío intenso"],
    correct: 1
  },
  {
    topic: "Síncope",
    q: "El patrón ECG del síndrome de Wolff-Parkinson-White (WPW) es:",
    options: [
      "QTc largo >480 ms + onda U prominente",
      "PR corto + onda delta + QRS ancho (>120 ms)",
      "Elevación ST en V1–V3 con morfología BRD (patrón de Brugada)",
      "Eje desviado izquierda + P mitrale"
    ],
    correct: 1
  },
  {
    topic: "Síncope",
    q: "El síndrome de Brugada en pediatría puede manifestarse como síncope o muerte súbita. El trigger más frecuente de arritmia fatal en este síndrome es:",
    options: ["Ejercicio extenuante", "Fiebre alta", "Hipoglucemia nocturna", "Deshidratación"],
    correct: 1
  },
  {
    topic: "Síncope",
    q: "Ante síncope con probable origen cardíaco en niño de 10 años con ECG alterado, el estudio de segunda línea más relevante es:",
    options: [

// ── LocalStorage ───────────────────────────────────────────────────────────
const LS_KEY = 'quiz_guada_state';

function saveState() {
  localStorage.setItem(LS_KEY, JSON.stringify({ current, answered }));
}

function loadState() {
  try {
    const saved = JSON.parse(localStorage.getItem(LS_KEY));
    if (saved && Array.isArray(saved.answered) && saved.answered.length === questions.length) {
      current = saved.current ?? 0;
      answered = saved.answered;
      return true;
    }
  } catch(e) {}
  return false;
}

// ── State ──────────────────────────────────────────────────────────────────
let current = 0;
let answered = new Array(questions.length).fill(null);

function render() {
  const q = questions[current];
  const total = questions.length;

  document.getElementById('progressBar').style.width = ((current + 1) / total * 100) + '%';
  document.getElementById('progressLabel').textContent = `Pregunta ${current + 1} de ${total}`;

  const correct = answered.filter((a, i) => a === questions[i].correct).length;
  const attempted = answered.filter(a => a !== null).length;
  document.getElementById('scoreLabel').textContent = `Correctas: ${correct}`;
  document.getElementById('scoreChip').textContent = `${correct} / ${attempted}`;

  document.getElementById('topicBadge').textContent = q.topic;
  document.getElementById('questionText').textContent = `${current + 1}. ${q.q}`;

  const labels = ['A', 'B', 'C', 'D'];
  const cont = document.getElementById('optionsContainer');
  cont.innerHTML = '';

  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.disabled = answered[current] !== null;

    let extraClass = '';
    if (answered[current] !== null) {
      if (i === q.correct) extraClass = 'correct';
      else if (i === answered[current]) extraClass = 'wrong';
    }
    if (extraClass) btn.classList.add(extraClass);

    btn.innerHTML = `<span class="option-label">${labels[i]}</span><span>${opt}</span>`;
    btn.onclick = () => selectOption(i);
    cont.appendChild(btn);
  });

  // Feedback
  const fb = document.getElementById('feedbackBox');
  const fi = document.getElementById('feedbackIcon');
  const ft = document.getElementById('feedbackText');
  fb.className = 'feedback-box';

  if (answered[current] !== null) {
    if (answered[current] === q.correct) {
      fb.classList.add('show', 'correct');
      fi.textContent = '✓';
      ft.textContent = '¡Correcto! Bien hecho.';
    } else {
      fb.classList.add('show', 'wrong');
      fi.textContent = '✗';
      ft.innerHTML = `Incorrecto. La respuesta correcta es: <strong>${labels[q.correct]}. ${q.options[q.correct]}</strong>`;
    }
  }

  document.getElementById('prevBtn').disabled = current === 0;

  const nextBtn = document.getElementById('nextBtn');
  if (current === total - 1) {
    nextBtn.textContent = 'Ver resultado';
  } else {
    nextBtn.textContent = 'Siguiente →';
  }
}

function selectOption(i) {
  if (answered[current] !== null) return;
  answered[current] = i;
  saveState();
  render();
}

function nextQuestion() {
  if (current < questions.length - 1) {
    current++;
    saveState();
    render();
  } else {
    showResults();
  }
}

function prevQuestion() {
  if (current > 0) { current--; saveState(); render(); }
}

function showResults() {
  document.getElementById('quizArea').classList.add('hide');
  const rs = document.getElementById('resultsScreen');
  rs.classList.add('show');

  const total = questions.length;
  const correct = answered.filter((a, i) => a === questions[i].correct).length;
  const wrong = answered.filter((a, i) => a !== null && a !== questions[i].correct).length;
  const pct = Math.round(correct / total * 100);

  document.getElementById('resultsPct').textContent = pct + '%';
  document.getElementById('rCorrect').textContent = correct;
  document.getElementById('rWrong').textContent = wrong;
  document.getElementById('rTotal').textContent = total;

  let msg = '';
  if (pct >= 90) msg = '¡Excelente! Dominio sobresaliente del tema.';
  else if (pct >= 75) msg = 'Muy bien. Conocimiento sólido.';
  else if (pct >= 60) msg = 'Bien. Repasar los temas donde fallaste.';
  else msg = 'Seguí estudiando. ¡Podés mejorar!';
  document.getElementById('resultsMsg').textContent = msg;
}

function confirmRestart() {
  if (confirm('¿Seguro que querés reiniciar? Se borrará todo tu progreso.')) {
    restartQuiz();
  }
}

function restartQuiz() {
  current = 0;
  answered = new Array(questions.length).fill(null);
  localStorage.removeItem(LS_KEY);
  document.getElementById('quizArea').classList.remove('hide');
  document.getElementById('resultsScreen').classList.remove('show');
  document.getElementById('restoreBanner').classList.remove('show');
  render();
}

// init — restaurar progreso o empezar desde cero
const hadSaved = loadState();
if (hadSaved) {
  document.getElementById('restoreBanner').classList.add('show');
}
render();
</script>
